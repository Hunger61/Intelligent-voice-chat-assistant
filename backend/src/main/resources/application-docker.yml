spring:
  profiles: docker
  datasource:
    url: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:vocalchat}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: redis
      port: 6379
  minio:
    endpoint: ${VC_MINIO_ENDPOINT:http://minio:9000}
    access-key: ${VC_MINIO_ROOT_USER:minioadmin}
    secret-key: ${VC_MINIO_ROOT_PASSWORD:minioadmin}

# logging (optional)
logging:
  level:
    root: INFO

