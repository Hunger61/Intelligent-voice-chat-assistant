spring:
  application:
    name: vocalchat
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  minio:
    endpoint: ${MINIO_ENDPOINT}   # MinIO API端口
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}

# Ollama configuration (values can be provided via environment variables OLLAMA_BASE_URL and OLLAMA_MODEL_NAME)
ollama:
  base-url: ${OLLAMA_BASE_URL}
  model-name: ${OLLAMA_MODEL_NAME}

qwen:
  model-name: ${QWEN_MODEL_NAME}
  api-key: ${QWEN_API_KEY}
  api-multiple-url: ${QWEN_API_MULTIPLE_URL}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

logging:
  level:
    root: INFO
    host.hunger.vocalchat.infrastructure.external.llm.OllamaQuestionAnsweringService: DEBUG
    host.hunger.vocalchat.application.service.AIAssistantApplicationService: DEBUG
    host.hunger.vocalchat.api.rest.controller.AIAssistantController: DEBUG
    dev.langchain4j: DEBUG
    okhttp3: DEBUG
    org.springframework.web: INFO

