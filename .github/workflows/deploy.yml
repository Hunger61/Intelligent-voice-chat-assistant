name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-vars:
    name: Prepare shared variables
    runs-on: ubuntu-latest
    outputs:
      image_namespace: ${{ steps.vars.outputs.image_namespace }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Compute image namespace and tag
        id: vars
        shell: bash
        run: |
          echo "image_namespace=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  build-and-push-backend:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest
    needs:
      - prepare-vars
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare-vars.outputs.image_namespace }}/vocalchat-backend
          tags: |
            type=raw,value=${{ needs.prepare-vars.outputs.image_tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-and-push-frontend:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest
    needs:
      - prepare-vars
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract frontend metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare-vars.outputs.image_namespace }}/vocalchat-frontend
          tags: |
            type=raw,value=${{ needs.prepare-vars.outputs.image_tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_BASE_URL=${{ vars.VITE_BASE_URL || 'http://aiassistant.hunger.host' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy with Docker Compose
    runs-on: ubuntu-latest
    needs:
      - prepare-vars
      - build-and-push-backend
      - build-and-push-frontend
    steps:
      - name: Run remote deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          timeout: 60s
          command_timeout: 60m
          script_stop: true
          script: |
            set -e
            export GIT_TERMINAL_PROMPT=0
            export COMPOSE_HTTP_TIMEOUT=180
            echo "[deploy] enter path"
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "[deploy] docker login"
            docker login ghcr.io -u "${{ secrets.DEPLOY_REGISTRY_USERNAME }}" -p "${{ secrets.DEPLOY_REGISTRY_PASSWORD }}"
            if [ -d .git ]; then
              echo "[deploy] git sync"
              git fetch origin
              git checkout "${{ github.ref_name }}"
              # Keep local ignored files (e.g. .env) intact; align tracked files to remote branch.
              git reset --hard "origin/${{ github.ref_name }}"
              git clean -fd
            fi
            echo "[deploy] update image env"
            if grep -q '^BACKEND_IMAGE=' .env; then
              sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${{ env.REGISTRY }}/${{ needs.prepare-vars.outputs.image_namespace }}/vocalchat-backend:${{ needs.prepare-vars.outputs.image_tag }}|" .env
            else
              echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${{ needs.prepare-vars.outputs.image_namespace }}/vocalchat-backend:${{ needs.prepare-vars.outputs.image_tag }}" >> .env
            fi
            if grep -q '^FRONTEND_IMAGE=' .env; then
              sed -i "s|^FRONTEND_IMAGE=.*|FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ needs.prepare-vars.outputs.image_namespace }}/vocalchat-frontend:${{ needs.prepare-vars.outputs.image_tag }}|" .env
            else
              echo "FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ needs.prepare-vars.outputs.image_namespace }}/vocalchat-frontend:${{ needs.prepare-vars.outputs.image_tag }}" >> .env
            fi
            BACKEND_IMAGE="${{ env.REGISTRY }}/${{ needs.prepare-vars.outputs.image_namespace }}/vocalchat-backend:${{ needs.prepare-vars.outputs.image_tag }}"
            FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ needs.prepare-vars.outputs.image_namespace }}/vocalchat-frontend:${{ needs.prepare-vars.outputs.image_tag }}"

            pull_with_retry() {
              image="$1"
              max_retry=3
              attempt=1
              while [ "$attempt" -le "$max_retry" ]; do
                echo "[deploy] pull attempt ${attempt}/${max_retry}: ${image}"
                if command -v timeout >/dev/null 2>&1; then
                  pull_cmd='timeout 20m docker pull "$image"'
                else
                  pull_cmd='docker pull "$image"'
                fi
                if eval "$pull_cmd"; then
                  return 0
                fi
                attempt=$((attempt + 1))
                sleep 10
              done
              echo "[deploy] pull failed after ${max_retry} attempts: ${image}"
              return 1
            }

            pull_with_retry "$BACKEND_IMAGE"
            pull_with_retry "$FRONTEND_IMAGE"
            echo "[deploy] docker compose up"
            docker compose up -d --remove-orphans --pull never
